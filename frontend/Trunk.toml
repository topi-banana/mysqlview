[serve]
addresses = ["127.0.0.1"]
port = 8080

[build]
target = "index.html"
dist = "../dist"

[tools]
# Pin the tailwindcss CLI to a v4 release. Trunk defaults to 3.3.5,
# which cannot parse the v4 `@theme {}` / `@import "tailwindcss"`
# syntax in style.css.
tailwindcss = "4.2.2"

[[proxy]]
backend = "http://127.0.0.1:3000/api"
