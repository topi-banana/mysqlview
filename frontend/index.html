<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            (function () {
                try {
                    var saved = null;
                    try { saved = window.localStorage.getItem("mysqlview-theme"); } catch (e) {}
                    var effective;
                    if (saved === "light" || saved === "dark") {
                        effective = saved;
                    } else {
                        effective = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)
                            ? "dark" : "light";
                    }
                    document.documentElement.setAttribute("data-theme", effective);
                } catch (e) {
                    document.documentElement.setAttribute("data-theme", "light");
                }
            })();
        </script>
        <title>mysqlview</title>
        <link rel="preconnect" href="https://api.fontshare.com" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link data-trunk rel="tailwind-css" href="./style.css" />
    </head>
    <body class="font-body bg-background text-text"></body>
</html>
