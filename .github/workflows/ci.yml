name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - run: taplo fmt --check

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Clippy (types + backend)
        run: cargo clippy -p mysqlview-types -p mysqlview-backend --all-targets -- -D warnings
      - name: Clippy (frontend, wasm32)
        run: cargo clippy -p mysqlview-frontend --target wasm32-unknown-unknown -- -D warnings

  release-build:
    name: release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc, default Ubuntu libc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mysqlview-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: mysqlview-linux-aarch64
          # Linux musl (fully static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mysqlview-linux-x86_64-musl
            musl: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: mysqlview-linux-aarch64-musl
            musl: true
          # Windows (MSVC)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mysqlview-windows-x86_64
            binary_ext: .exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: mysqlview-windows-aarch64
            binary_ext: .exe
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mysqlview-macos-aarch64
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown
      - name: Install musl build deps
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-build-${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: trunk
      - name: Build frontend (release)
        working-directory: frontend
        run: trunk build --release
      - name: Build backend (embedded-frontend)
        run: cargo build --release --target ${{ matrix.target }} --features embedded-frontend -p mysqlview-backend
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/mysqlview-backend${{ matrix.binary_ext }}
          if-no-files-found: error

  docker-push:
    name: docker build & push (ghcr.io)
    runs-on: ubuntu-latest
    needs: [clippy]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
