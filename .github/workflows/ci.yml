name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - run: taplo fmt --check

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Clippy (types + backend)
        run: cargo clippy -p mysqlview-types -p mysqlview-backend --all-targets -- -D warnings
      - name: Clippy (frontend, wasm32)
        run: cargo clippy -p mysqlview-frontend --target wasm32-unknown-unknown -- -D warnings

  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-build
      - uses: jetli/trunk-action@v0.5.1
        with:
          version: latest
      - name: Build frontend (release)
        working-directory: frontend
        run: trunk build --release
      - name: Build types + backend (default features)
        run: cargo build --release -p mysqlview-types -p mysqlview-backend
      - name: Build single-binary backend (embedded-frontend)
        run: cargo build --release -p mysqlview-backend --features embedded-frontend
      - name: Upload single-binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysqlview-linux-x86_64
          path: target/release/mysqlview-backend
          if-no-files-found: error

  musl-build:
    name: musl static build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, wasm32-unknown-unknown
      - name: Install musl build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools cmake
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-build
      - uses: jetli/trunk-action@v0.5.1
        with:
          version: latest
      - name: Build frontend (release)
        working-directory: frontend
        run: trunk build --release
      - name: Build static backend (musl + embedded-frontend)
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            --features embedded-frontend \
            -p mysqlview-backend
      - name: Upload static binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysqlview-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/mysqlview-backend
          if-no-files-found: error
