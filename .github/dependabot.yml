version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: daily
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
